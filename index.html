<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ouro Verde Jardinagem</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{

background:
linear-gradient(rgba(0,40,0,0.6), rgba(0,70,0,0.7)),
url("74ecec62-9f17-448b-b6d5-15b413aeeae9.jpg");

background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}

/* CONTAINER MOBILE */

.container{

width:100%;
max-width:420px;

background:rgba(255,255,255,0.95);

border-radius:16px;

padding:25px;

box-shadow:0 15px 40px rgba(0,0,0,0.4);

}

/* TITLE */

h1{

text-align:center;

font-size:22px;

color:#0f6b2c;

margin-bottom:20px;

}

/* SERVICES */

.services{

display:flex;

flex-direction:column;

gap:12px;

}

/* CARD */

.card{

background:#ffffff;

padding:16px;

border-radius:10px;

display:flex;

justify-content:space-between;

align-items:center;

font-size:16px;

box-shadow:0 3px 10px rgba(0,0,0,0.12);

transition:0.25s;

}

.card:hover{

transform:scale(1.03);

}

/* PRICE */

.price{

color:#0f6b2c;

font-weight:bold;

}

/* WHATSAPP BUTTON */

.btn{

display:block;

margin-top:20px;

text-align:center;

background:#25D366;

color:white;

padding:16px;

border-radius:10px;

font-size:18px;

text-decoration:none;

font-weight:bold;

transition:0.3s;

}

.btn:hover{

background:#00ff6a;

color:#003b12;

}

/* FLOAT WHATSAPP */

.float{

position:fixed;

bottom:20px;
right:20px;

background:#25D366;

width:60px;
height:60px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:26px;

color:white;

text-decoration:none;

box-shadow:0 5px 20px rgba(0,0,0,0.4);

}

</style>

</head>

<body>

<div class="container">

<h1>🌿 Ouro Verde Jardinagem</h1>

<div class="services">

<div class="card">
<span>Corte de Grama</span>
<span class="price">R$50</span>
</div>

<div class="card">
<span>Limpeza de Jardim</span>
<span class="price">R$80</span>
</div>

<div class="card">
<span>Poda de Árvores</span>
<span class="price">R$100</span>
</div>

<div class="card">
<span>Plantio de Flores</span>
<span class="price">R$120</span>
</div>

<div class="card">
<span>Manutenção de Jardins</span>
<span class="price">R$150</span>
</div>

<div class="card">
<span>Limpeza de Terrenos</span>
<span class="price">R$200</span>
</div>

</div>

<a class="btn"
href="https://wa.me/5542999895515?text=Olá%20preciso%20de%20serviço%20de%20jardinagem">

Falar no WhatsApp

</a>

</div>

<a class="float"
href="https://wa.me/5542999895515">

💬

</a>

</body>
</html>
